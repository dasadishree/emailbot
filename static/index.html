<html>
    <head>
        <title>Research Email Bot/Helper</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>

    <body>
        <nav id="navbar">
            <button class="nav-btn active">find new mentors</button>
            <a href="https://docs.google.com/spreadsheets/d/18w40jiZjZiCOgTwDqlDRnTfTt3lYklaTQ6B7IC5_Wps/edit?usp=sharing" target="_blank" class="nav-btn">past herricks student's mentors</a>
            <button class="nav-btn disabled">help writing papers/journal summaries</button>
        </nav>
        <div id="hero">
            <h1><span class="highlight">research helper</span></h1>
            <p>search a university/research institution and your research areas of interest! searches may take a minute!</p>
            <div id="search-form">
                <div class="search-row">
                    <label class="search-label" for="school-input">University</label>
                    <input type="text" id="school-input" class="search-input" placeholder="Enter university/research institution name"/>
                </div>
                <div class="search-row">
                    <label class="search-label" for="category-input">Research areas</label>
                    <input type="text" id="category-input" class="search-input" placeholder="Enter research interest/field topics"/>
                </div>
                <button id="search-btn" onclick="search()">⌕ search</button>
            </div>
        </div>

        <div id="status"></div>
        <div id="results"></div>

        <script src="/static/script.js"></script>
    </body>
</html>
